<!DOCTYPE html>
<html>
    <head>
        <title>Mi²Gltf</title>
        <script type="module" src="model-viewer.min.js"></script>
    </head>
    <body>
        <model-viewer
            src="fire.gltf"
            camera-controls
            interaction-prompt="none"
            camera-orbit="-35deg 65deg"
            shadow-intensity="1"
            auto-rotate
            autoplay
            shadow-softness="1"
            exposure="0.5"
            environment-image="legacy"
            tonemapping="Neutral"
            ar-status="not-presenting"
            field-of-view="1deg"
            style="width:100%;height:100vh"
        ></model-viewer>
    </body>
</html>
